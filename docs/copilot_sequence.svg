<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 640" width="1080" height="640" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22c55e"/>
    </marker>
    <marker id="arr-a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
    <marker id="arr-p" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a78bfa"/>
    </marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f87171"/>
    </marker>
  </defs>

  <rect width="1080" height="640" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="540" y="38" text-anchor="middle" fill="#f1f5f9" font-size="21" font-weight="700">CoinGeckoAnalytical — Copilot Sequence Diagram</text>
  <text x="540" y="58" text-anchor="middle" fill="#f59e0b" font-size="12">Tier routing · multi-agent orchestration · provenance-aware response</text>
  <line x1="40" y1="68" x2="1040" y2="68" stroke="#334155" stroke-width="1"/>

  <!-- ══════════════════════════════════════════════ -->
  <!-- PARTICIPANTS (lifeline headers) -->
  <!-- ══════════════════════════════════════════════ -->
  <!-- X positions: User=75, BFF=210, Router=345, Mosaic=480, Orch=615, Agents=750, Gold=885, Resp=1005 -->

  <!-- User -->
  <rect x="30" y="80" width="90" height="44" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="75" y="98" text-anchor="middle" fill="#f1f5f9" font-size="11" font-weight="600">User</text>
  <text x="75" y="114" text-anchor="middle" fill="#64748b" font-size="9">cga-analytics</text>

  <!-- BFF -->
  <rect x="165" y="80" width="90" height="44" rx="6" fill="#134e4a" stroke="#0f766e" stroke-width="1.5"/>
  <text x="210" y="98" text-anchor="middle" fill="#5eead4" font-size="11" font-weight="600">BFF / MVP</text>
  <text x="210" y="114" text-anchor="middle" fill="#0f766e" font-size="9">routing_bff.py</text>

  <!-- Tier Router -->
  <rect x="300" y="80" width="90" height="44" rx="6" fill="#0c1a2e" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="345" y="98" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">TierRouter</text>
  <text x="345" y="114" text-anchor="middle" fill="#1d4ed8" font-size="9">model_tier_router</text>

  <!-- Mosaic AI -->
  <rect x="435" y="80" width="90" height="44" rx="6" fill="#1a0533" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="480" y="98" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">Mosaic AI</text>
  <text x="480" y="114" text-anchor="middle" fill="#7c3aed" font-size="9">FMAPI endpoint</text>

  <!-- Orchestrator -->
  <rect x="570" y="80" width="90" height="44" rx="6" fill="#1a0533" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="615" y="98" text-anchor="middle" fill="#e9d5ff" font-size="11" font-weight="600">Orchestrator</text>
  <text x="615" y="114" text-anchor="middle" fill="#7c3aed" font-size="9">copilot_orchestrator</text>

  <!-- Domain Agents -->
  <rect x="705" y="80" width="90" height="44" rx="6" fill="#0d1f0d" stroke="#15803d" stroke-width="1.5"/>
  <text x="750" y="98" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">Agents</text>
  <text x="750" y="114" text-anchor="middle" fill="#15803d" font-size="9">Market·Macro·DeFi</text>

  <!-- Gold Tables -->
  <rect x="840" y="80" width="90" height="44" rx="6" fill="#1c1005" stroke="#d97706" stroke-width="1.5"/>
  <text x="885" y="98" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">Gold Tables</text>
  <text x="885" y="114" text-anchor="middle" fill="#92400e" font-size="9">Unity Catalog</text>

  <!-- SynthAgent -->
  <rect x="975" y="80" width="90" height="44" rx="6" fill="#1a0533" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="1020" y="98" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">SynthAgent</text>
  <text x="1020" y="114" text-anchor="middle" fill="#7c3aed" font-size="9">narrative synthesis</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- LIFELINES -->
  <!-- ══════════════════════════════════════════════ -->
  <line x1="75"   y1="124" x2="75"   y2="610" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="210"  y1="124" x2="210"  y2="610" stroke="#0f766e" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="345"  y1="124" x2="345"  y2="610" stroke="#1d4ed8" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="480"  y1="124" x2="480"  y2="610" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="615"  y1="124" x2="615"  y2="610" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="750"  y1="124" x2="750"  y2="610" stroke="#15803d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="885"  y1="124" x2="885"  y2="610" stroke="#d97706" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="1020" y1="124" x2="1020" y2="610" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ══════════════════════════════════════════════ -->
  <!-- SEQUENCE STEPS -->
  <!-- ══════════════════════════════════════════════ -->

  <!-- Step 1: User → BFF -->
  <line x1="75" y1="158" x2="202" y2="158" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="76" y="142" width="2" height="28" fill="#475569"/>
  <text x="135" y="152" text-anchor="middle" fill="#cbd5e1" font-size="10">query + user_id</text>
  <text x="40" y="172" fill="#94a3b8" font-size="9">①</text>

  <!-- Step 2: BFF → Router -->
  <line x1="210" y1="186" x2="337" y2="186" stroke="#0f766e" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="273" y="180" text-anchor="middle" fill="#5eead4" font-size="10">classify(query)</text>
  <text x="40" y="200" fill="#94a3b8" font-size="9">②</text>

  <!-- Step 3a: LIGHT tier — Router → Mosaic directly -->
  <rect x="210" y="208" width="310" height="28" rx="4" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <text x="365" y="221" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600">LIGHT tier path</text>
  <text x="365" y="232" text-anchor="middle" fill="#16a34a" font-size="9">simple factual query</text>

  <line x1="345" y1="250" x2="472" y2="250" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="408" y="244" text-anchor="middle" fill="#86efac" font-size="10">direct LLM call</text>
  <text x="40" y="262" fill="#94a3b8" font-size="9">③a</text>

  <line x1="480" y1="270" x2="353" y2="270" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-g)"/>
  <text x="416" y="264" text-anchor="middle" fill="#86efac" font-size="9">answer (fast)</text>

  <!-- Step 3b: COMPLEX tier box -->
  <rect x="344" y="292" width="540" height="28" rx="4" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="614" y="305" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">COMPLEX tier path</text>
  <text x="614" y="316" text-anchor="middle" fill="#7c3aed" font-size="9">multi-factor market question</text>

  <!-- sanitize input -->
  <rect x="344" y="328" width="130" height="20" rx="3" fill="#1e293b" stroke="#f87171" stroke-width="1"/>
  <text x="409" y="341" text-anchor="middle" fill="#fca5a5" font-size="9">sanitize_user_input()</text>

  <!-- Router → Orchestrator -->
  <line x1="345" y1="362" x2="607" y2="362" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-p)"/>
  <text x="476" y="356" text-anchor="middle" fill="#c4b5fd" font-size="10">route to orchestrator</text>
  <text x="40" y="374" fill="#94a3b8" font-size="9">③b</text>

  <!-- Orchestrator → Market Agent -->
  <line x1="615" y1="390" x2="742" y2="390" stroke="#86efac" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="678" y="384" text-anchor="middle" fill="#86efac" font-size="9.5">MarketAgent.run()</text>
  <text x="40" y="402" fill="#94a3b8" font-size="9">④</text>

  <!-- Market Agent → Gold -->
  <line x1="750" y1="414" x2="877" y2="414" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-a)"/>
  <text x="813" y="408" text-anchor="middle" fill="#fcd34d" font-size="9.5">SELECT gold_market_*</text>
  <text x="40" y="426" fill="#94a3b8" font-size="9">⑤</text>

  <!-- Gold → Agent return -->
  <line x1="885" y1="434" x2="758" y2="434" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-a)"/>
  <text x="821" y="428" text-anchor="middle" fill="#fcd34d" font-size="9">market_context{}</text>

  <!-- Macro + DeFi agents (parallel, condensed) -->
  <rect x="616" y="452" width="268" height="22" rx="3" fill="#052e16" stroke="#15803d" stroke-width="1"/>
  <text x="750" y="466" text-anchor="middle" fill="#86efac" font-size="9">MacroAgent + DefiAgent run in parallel → gold_macro_* + gold_defi_* contexts</text>
  <text x="40" y="476" fill="#94a3b8" font-size="9">⑥</text>

  <!-- Orchestrator → SynthAgent -->
  <line x1="615" y1="490" x2="1012" y2="490" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-p)"/>
  <text x="813" y="484" text-anchor="middle" fill="#c4b5fd" font-size="10">SynthAgent(contexts[])</text>
  <text x="40" y="502" fill="#94a3b8" font-size="9">⑦</text>

  <!-- Synth → Mosaic call -->
  <line x1="1020" y1="514" x2="488" y2="514" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-p)"/>
  <text x="754" y="508" text-anchor="middle" fill="#c4b5fd" font-size="9">LLM call with grounded context</text>
  <text x="40" y="526" fill="#94a3b8" font-size="9">⑧</text>

  <!-- Mosaic → Synth return -->
  <line x1="480" y1="534" x2="1012" y2="534" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-p)"/>
  <text x="746" y="528" text-anchor="middle" fill="#c4b5fd" font-size="9">narrative text</text>

  <!-- SynthAgent → BFF return -->
  <line x1="1020" y1="558" x2="218" y2="558" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-a)"/>
  <text x="619" y="552" text-anchor="middle" fill="#fcd34d" font-size="10">answer + provenance + freshness + cost_usd</text>
  <text x="40" y="570" fill="#94a3b8" font-size="9">⑨</text>

  <!-- BFF → User final -->
  <line x1="210" y1="582" x2="83" y2="582" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="146" y="576" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">Response rendered</text>
  <text x="40" y="594" fill="#94a3b8" font-size="9">⑩</text>

  <!-- Bottom note -->
  <line x1="40" y1="604" x2="1040" y2="604" stroke="#1e293b" stroke-width="1"/>
  <text x="540" y="620" text-anchor="middle" fill="#334155" font-size="9.5">Budget cap checked before each LLM call · user_id hashed sha256 before telemetry · prompt loaded from backend/prompts/v1.yaml</text>
</svg>

    sentinela_evaluation_job:
      name: sentinela_evaluation_job
      description: Evaluate ops telemetry and bundle runs; write Sentinela alerts to ops_observability.
      tasks:
        - task_key: evaluate_sentinela
          spark_python_task:
            python_file: ./databricks/jobs/sentinela_evaluation_job.py

    silver_enrichment_pipeline_job:
      name: silver_enrichment_pipeline_job
      description: Materialise silver_asset_enriched and silver_macro_context from Bronze enrichment sources.
      tasks:
        - task_key: run_silver_enrichment
          spark_python_task:
            python_file: ./databricks/jobs/silver_enrichment_pipeline_job.py

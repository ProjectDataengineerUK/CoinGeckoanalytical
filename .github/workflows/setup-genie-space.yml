name: setup-genie-space

on:
  workflow_dispatch:
    inputs:
      space_title:
        description: "Genie Space display title"
        required: false
        default: "CoinGecko Market Intelligence"
      space_description:
        description: "Genie Space description"
        required: false
        default: "Governed analytical Q&A over CoinGeckoAnalytical market data"
      warehouse_id:
        description: "SQL Warehouse ID to attach to the Genie Space (required by some workspace versions)"
        required: false
        default: ""

permissions:
  id-token: write
  contents: read

jobs:
  provision-genie-space:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_SQL_WAREHOUSE_ID: ${{ secrets.DATABRICKS_SQL_WAREHOUSE_ID }}
    steps:
      - name: Check prerequisites
        run: |
          if [ -z "$DATABRICKS_HOST" ]; then
            echo "Missing DATABRICKS_HOST" && exit 1
          fi
          if [ -z "$DATABRICKS_TOKEN" ]; then
            echo "Missing DATABRICKS_TOKEN" && exit 1
          fi

      - name: List existing Genie Spaces (probe endpoint)
        id: probe
        run: |
          HOST="${DATABRICKS_HOST%/}"
          echo "Probing $HOST/api/2.0/genie/spaces ..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            -H "Content-Type: application/json" \
            "$HOST/api/2.0/genie/spaces")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
          echo "HTTP status: $HTTP_STATUS"
          echo "Response body: $BODY"
          echo "http_status=$HTTP_STATUS" >> "$GITHUB_OUTPUT"
          echo "list_body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create or retrieve Genie Space
        id: genie
        env:
          SPACE_TITLE: ${{ inputs.space_title }}
          SPACE_DESCRIPTION: ${{ inputs.space_description }}
          INPUT_WAREHOUSE_ID: ${{ inputs.warehouse_id }}
          PROBE_STATUS: ${{ steps.probe.outputs.http_status }}
          LIST_BODY: ${{ steps.probe.outputs.list_body }}
        run: |
          HOST="${DATABRICKS_HOST%/}"

          if [ "$PROBE_STATUS" != "200" ]; then
            echo "WARNING: Genie Spaces API returned HTTP $PROBE_STATUS"
            echo "This workspace may not support the Genie REST API for space creation."
            echo "The space_id must be retrieved manually from the Databricks UI."
            echo "space_id=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Prefer warehouse from secret, fall back to workflow input
          WAREHOUSE_ID="${DATABRICKS_SQL_WAREHOUSE_ID:-$INPUT_WAREHOUSE_ID}"

          EXISTING_ID=$(python3 -c "
          import sys, json, os
          try:
              data = json.loads(os.environ.get('LIST_BODY', '{}'))
              spaces = data.get('genie_spaces') or data.get('spaces') or data.get('items') or []
              title = os.environ.get('SPACE_TITLE', '')
              match = next((s for s in spaces if s.get('title') == title), None)
              print(match.get('space_id', '') if match else '')
          except Exception:
              print('')
          ")

          if [ -n "$EXISTING_ID" ]; then
            echo "Space already exists: $EXISTING_ID"
            SPACE_ID="$EXISTING_ID"
          else
            echo "Creating new Genie Space..."
            PAYLOAD=$(python3 -c "
          import json, os
          p = {
              'title': os.environ.get('SPACE_TITLE', ''),
              'description': os.environ.get('SPACE_DESCRIPTION', ''),
          }
          wh = os.environ.get('WAREHOUSE_ID', '')
          if wh:
              p['warehouse_id'] = wh
          print(json.dumps(p))
          ")
            echo "Payload: $PAYLOAD"

            CREATE_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $DATABRICKS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "$HOST/api/2.0/genie/spaces")
            CREATE_STATUS=$(echo "$CREATE_RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
            CREATE_BODY=$(echo "$CREATE_RESPONSE" | grep -v "HTTP_STATUS:")
            echo "Create HTTP status: $CREATE_STATUS"
            echo "Create response: $CREATE_BODY"

            if [ "$CREATE_STATUS" != "200" ] && [ "$CREATE_STATUS" != "201" ]; then
              echo "ERROR: Space creation failed with HTTP $CREATE_STATUS"
              echo "The space_id must be created manually in the Databricks UI."
              echo "space_id=" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            SPACE_ID=$(python3 -c "
          import sys, json
          try:
              data = json.loads('$CREATE_BODY')
              print(data.get('space_id') or data.get('id') or '')
          except Exception:
              print('')
          ")
            echo "Genie Space created: $SPACE_ID"
          fi

          echo "space_id=$SPACE_ID" >> "$GITHUB_OUTPUT"

      - name: Register metric views in Genie Space
        if: steps.genie.outputs.space_id != ''
        env:
          SPACE_ID: ${{ steps.genie.outputs.space_id }}
        run: |
          HOST="${DATABRICKS_HOST%/}"

          TABLES=(
            "cgadev.ai_serving.mv_market_rankings"
            "cgadev.ai_serving.mv_top_movers"
            "cgadev.ai_serving.mv_market_dominance"
            "cgadev.ai_serving.mv_cross_asset_compare"
          )

          for TABLE_FQN in "${TABLES[@]}"; do
            echo "Registering table: $TABLE_FQN"
            RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $DATABRICKS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"table_name\": \"$TABLE_FQN\"}" \
              "$HOST/api/2.0/genie/spaces/$SPACE_ID/tables")
            STATUS=$(echo "$RESP" | grep "HTTP_STATUS:" | cut -d: -f2)
            echo "  $TABLE_FQN -> HTTP $STATUS"
          done

      - name: Print space_id for secret registration
        if: steps.genie.outputs.space_id != ''
        env:
          SPACE_ID: ${{ steps.genie.outputs.space_id }}
        run: |
          echo ""
          echo "============================================="
          echo "  Genie Space provisioned successfully"
          echo "  space_id: $SPACE_ID"
          echo "============================================="
          echo ""
          echo "Next step: register this value as a GitHub secret:"
          echo "  Secret name : DATABRICKS_GENIE_SPACE_ID"
          echo "  Secret value: $SPACE_ID"
          echo ""
          echo "Then dispatch ci.yml with confirm_deploy=true to wire"
          echo "the backend genie_client.py to this space."

      - name: Genie Space requires manual creation
        if: steps.genie.outputs.space_id == ''
        run: |
          echo ""
          echo "============================================="
          echo "  ACTION REQUIRED: Manual Genie Space setup"
          echo "============================================="
          echo ""
          echo "The Genie Spaces REST API is not available on this workspace"
          echo "or creation requires UI-level setup."
          echo ""
          echo "Steps to create manually:"
          echo "  1. Open Databricks workspace -> New -> Genie Space"
          echo "  2. Title: CoinGecko Market Intelligence"
          echo "  3. Add tables: cgadev.ai_serving.mv_market_rankings,"
          echo "                 cgadev.ai_serving.mv_top_movers,"
          echo "                 cgadev.ai_serving.mv_market_dominance,"
          echo "                 cgadev.ai_serving.mv_cross_asset_compare"
          echo "  4. Copy the space_id from the URL"
          echo "  5. Set GitHub secret DATABRICKS_GENIE_SPACE_ID = <space_id>"

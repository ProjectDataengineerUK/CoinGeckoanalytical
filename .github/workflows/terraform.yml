name: terraform

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      confirm_apply:
        description: "Set to true to run terraform apply after the plan job."
        required: false
        type: boolean
        default: false

jobs:
  dev-plan:
    runs-on: ubuntu-latest
    env:
      TF_VAR_environment: dev
      TF_VAR_catalog_name: cgadev
      TF_VAR_databricks_host: ${{ secrets.DATABRICKS_HOST }}
      TF_VAR_databricks_token: ${{ secrets.DATABRICKS_TOKEN }}
      TF_VAR_data_platform_group: ${{ secrets.TF_VAR_DATA_PLATFORM_GROUP }}
      TF_VAR_product_backend_group: ${{ secrets.TF_VAR_PRODUCT_BACKEND_GROUP }}
      TF_VAR_product_analytics_group: ${{ secrets.TF_VAR_PRODUCT_ANALYTICS_GROUP }}
      TF_VAR_platform_ops_group: ${{ secrets.TF_VAR_PLATFORM_OPS_GROUP }}
      TF_VAR_governance_admin_group: ${{ secrets.TF_VAR_GOVERNANCE_ADMIN_GROUP }}
      TF_VAR_svc_market_ingestion: ${{ secrets.TF_VAR_SVC_MARKET_INGESTION }}
      TF_VAR_svc_market_pipeline: ${{ secrets.TF_VAR_SVC_MARKET_PIPELINE }}
      TF_VAR_svc_ops_pipeline: ${{ secrets.TF_VAR_SVC_OPS_PIPELINE }}
      TF_VAR_svc_audit_pipeline: ${{ secrets.TF_VAR_SVC_AUDIT_PIPELINE }}
      TF_VAR_bundle_root: ${{ secrets.TF_VAR_BUNDLE_ROOT }}
      TF_VAR_ops_cluster_id: ${{ secrets.TF_VAR_OPS_CLUSTER_ID }}
      TF_VAR_ops_spark_version: ${{ secrets.TF_VAR_OPS_SPARK_VERSION }}
      TF_VAR_ops_node_type_id: ${{ secrets.TF_VAR_OPS_NODE_TYPE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.0"

      - name: Check Terraform dev plan prerequisites
        id: terraform_prereq
        run: |
          ready=true
          for name in \
            TF_VAR_databricks_host \
            TF_VAR_databricks_token \
            TF_VAR_data_platform_group \
            TF_VAR_product_backend_group \
            TF_VAR_product_analytics_group \
            TF_VAR_platform_ops_group \
            TF_VAR_governance_admin_group \
            TF_VAR_svc_market_ingestion \
            TF_VAR_svc_market_pipeline \
            TF_VAR_svc_ops_pipeline \
            TF_VAR_svc_audit_pipeline \
            TF_VAR_bundle_root \
            TF_VAR_ops_cluster_id
          do
            if [ -z "${!name}" ]; then
              echo "Missing Terraform input: $name"
              ready=false
            fi
          done
          echo "terraform_ready=$ready" >> "$GITHUB_OUTPUT"

      - name: Terraform init
        if: steps.terraform_prereq.outputs.terraform_ready == 'true'
        run: terraform init
        working-directory: databricks/terraform

      - name: Terraform validate
        if: steps.terraform_prereq.outputs.terraform_ready == 'true'
        run: terraform validate
        working-directory: databricks/terraform

      - name: Terraform plan dev
        if: steps.terraform_prereq.outputs.terraform_ready == 'true'
        run: terraform plan -out=tfplan
        working-directory: databricks/terraform

      - name: Export Terraform plan text
        if: steps.terraform_prereq.outputs.terraform_ready == 'true'
        run: terraform show -no-color tfplan > tfplan.txt
        working-directory: databricks/terraform

      - name: Upload Terraform dev plan artifact
        if: steps.terraform_prereq.outputs.terraform_ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-dev-plan
          path: |
            databricks/terraform/tfplan
            databricks/terraform/tfplan.txt

  dev-apply:
    runs-on: ubuntu-latest
    needs: dev-plan
    if: github.event_name == 'workflow_dispatch' && inputs.confirm_apply
    env:
      TF_VAR_environment: dev
      TF_VAR_catalog_name: cgadev
      TF_VAR_databricks_host: ${{ secrets.DATABRICKS_HOST }}
      TF_VAR_databricks_token: ${{ secrets.DATABRICKS_TOKEN }}
      TF_VAR_data_platform_group: ${{ secrets.TF_VAR_DATA_PLATFORM_GROUP }}
      TF_VAR_product_backend_group: ${{ secrets.TF_VAR_PRODUCT_BACKEND_GROUP }}
      TF_VAR_product_analytics_group: ${{ secrets.TF_VAR_PRODUCT_ANALYTICS_GROUP }}
      TF_VAR_platform_ops_group: ${{ secrets.TF_VAR_PLATFORM_OPS_GROUP }}
      TF_VAR_governance_admin_group: ${{ secrets.TF_VAR_GOVERNANCE_ADMIN_GROUP }}
      TF_VAR_svc_market_ingestion: ${{ secrets.TF_VAR_SVC_MARKET_INGESTION }}
      TF_VAR_svc_market_pipeline: ${{ secrets.TF_VAR_SVC_MARKET_PIPELINE }}
      TF_VAR_svc_ops_pipeline: ${{ secrets.TF_VAR_SVC_OPS_PIPELINE }}
      TF_VAR_svc_audit_pipeline: ${{ secrets.TF_VAR_SVC_AUDIT_PIPELINE }}
      TF_VAR_bundle_root: ${{ secrets.TF_VAR_BUNDLE_ROOT }}
      TF_VAR_ops_cluster_id: ${{ secrets.TF_VAR_OPS_CLUSTER_ID }}
      TF_VAR_ops_spark_version: ${{ secrets.TF_VAR_OPS_SPARK_VERSION }}
      TF_VAR_ops_node_type_id: ${{ secrets.TF_VAR_OPS_NODE_TYPE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.0"

      - name: Download Terraform dev plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-dev-plan
          path: databricks/terraform

      - name: Terraform init
        run: terraform init
        working-directory: databricks/terraform

      - name: Terraform apply dev
        run: terraform apply -auto-approve tfplan
        working-directory: databricks/terraform

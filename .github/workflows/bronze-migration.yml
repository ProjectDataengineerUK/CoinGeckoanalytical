name: bronze-migration

on:
  workflow_dispatch:
    inputs:
      confirm_migration:
        description: "Set to true to run the Bronze schema remediation job."
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  dev-migration:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.confirm_migration
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deploy dependencies
        run: python3 -m pip install --upgrade pip pyyaml

      - name: Install Databricks CLI
        uses: databricks/setup-cli@v0.240.0

      - name: Check migration prerequisites
        id: prereq
        run: |
          ready=true
          if [ -z "$DATABRICKS_HOST" ]; then
            echo "Missing DATABRICKS_HOST; skipping migration."
            ready=false
          elif [ -z "$DATABRICKS_TOKEN" ] && { [ -z "$DATABRICKS_CLIENT_ID" ] || [ -z "$DATABRICKS_CLIENT_SECRET" ]; }; then
            echo "Missing auth: set DATABRICKS_TOKEN or both DATABRICKS_CLIENT_ID and DATABRICKS_CLIENT_SECRET; skipping migration."
            ready=false
          elif ! command -v databricks >/dev/null 2>&1; then
            echo "Databricks CLI not installed; skipping migration."
            ready=false
          fi
          echo "migration_ready=$ready" >> "$GITHUB_OUTPUT"

      - name: Validate bundle
        if: steps.prereq.outputs.migration_ready == 'true'
        run: |
          cd databricks
          python3 tools/validate_bundle.py
          databricks bundle validate

      - name: Deploy bundle
        if: steps.prereq.outputs.migration_ready == 'true'
        run: |
          cd databricks
          databricks bundle deploy -t dev

      - name: Run Bronze migration
        if: steps.prereq.outputs.migration_ready == 'true'
        run: |
          cd databricks
          databricks bundle run bronze_market_table_migration_job -t dev

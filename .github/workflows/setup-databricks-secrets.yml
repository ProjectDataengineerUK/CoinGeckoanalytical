name: setup-databricks-secrets

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  populate-secret-scope:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
    steps:
      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Check prerequisites
        run: |
          if [ -z "$DATABRICKS_HOST" ]; then
            echo "Missing DATABRICKS_HOST" && exit 1
          fi
          if [ -z "$DATABRICKS_TOKEN" ]; then
            echo "Missing DATABRICKS_TOKEN" && exit 1
          fi
          if [ -z "$COINGECKO_API_KEY" ]; then
            echo "Missing COINGECKO_API_KEY" && exit 1
          fi

      - name: Create secret scope coingecko (idempotent)
        run: |
          databricks secrets create-scope coingecko 2>/dev/null || echo "Scope already exists, continuing."

      - name: Populate coingecko/api_key
        run: |
          databricks secrets put-secret coingecko api_key --string-value "$COINGECKO_API_KEY"
          echo "Secret coingecko/api_key populated."

      - name: Verify scope
        run: |
          databricks secrets list-secrets coingecko

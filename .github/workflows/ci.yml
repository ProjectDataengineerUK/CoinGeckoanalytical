name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile repository Python
        run: python3 -m compileall backend databricks repo_tests

  contract:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependency
        run: python3 -m pip install --upgrade pip pyyaml

      - name: Run backend tests
        run: python3 -m unittest discover -s backend/tests -p 'test_*.py'

      - name: Run Databricks bundle validation helper
        run: python3 databricks/validate_bundle.py

      - name: Run market overview chain validation
        run: python3 databricks/validate_market_overview_chain.py

      - name: Run Databricks helper tests
        run: |
          python3 -m unittest databricks.test_validate_bundle
          python3 -m unittest databricks.test_validate_market_overview_chain
          python3 -m unittest databricks.test_live_sql_validation
          python3 -m unittest databricks.test_market_source_ingestion_job
          python3 -m unittest databricks.test_bundle_run_observability
          python3 -m unittest databricks.test_ops_usage_ingestion_job
          python3 -m unittest databricks.test_ops_readiness_refresh_job
          python3 -m unittest databricks.test_bundle_run_ingestion_job
          python3 -m unittest databricks.test_sentinela_alert_ingestion_job
          python3 -m unittest databricks.test_sentinela_alert_observability
          python3 -m unittest databricks.test_ops_readiness_refresh_job

      - name: Run workflow contract tests
        run: python3 -m unittest discover -s repo_tests -p 'test_*.py'

  terraform-dev-plan:
    runs-on: ubuntu-latest
    needs: contract
    env:
      TF_VAR_environment: dev
      TF_VAR_catalog_name: cgadev
      TF_VAR_databricks_host: ${{ secrets.DATABRICKS_HOST }}
      TF_VAR_databricks_token: ${{ secrets.DATABRICKS_TOKEN }}
      TF_VAR_data_platform_group: ${{ secrets.TF_VAR_DATA_PLATFORM_GROUP }}
      TF_VAR_product_backend_group: ${{ secrets.TF_VAR_PRODUCT_BACKEND_GROUP }}
      TF_VAR_product_analytics_group: ${{ secrets.TF_VAR_PRODUCT_ANALYTICS_GROUP }}
      TF_VAR_platform_ops_group: ${{ secrets.TF_VAR_PLATFORM_OPS_GROUP }}
      TF_VAR_governance_admin_group: ${{ secrets.TF_VAR_GOVERNANCE_ADMIN_GROUP }}
      TF_VAR_svc_market_ingestion: ${{ secrets.TF_VAR_SVC_MARKET_INGESTION }}
      TF_VAR_svc_market_pipeline: ${{ secrets.TF_VAR_SVC_MARKET_PIPELINE }}
      TF_VAR_svc_ops_pipeline: ${{ secrets.TF_VAR_SVC_OPS_PIPELINE }}
      TF_VAR_svc_audit_pipeline: ${{ secrets.TF_VAR_SVC_AUDIT_PIPELINE }}
      TF_VAR_bundle_root: ${{ secrets.TF_VAR_BUNDLE_ROOT }}
      TF_VAR_ops_cluster_id: ${{ secrets.TF_VAR_OPS_CLUSTER_ID }}
      TF_VAR_ops_spark_version: ${{ secrets.TF_VAR_OPS_SPARK_VERSION }}
      TF_VAR_ops_node_type_id: ${{ secrets.TF_VAR_OPS_NODE_TYPE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.0"

      - name: Check Terraform dev plan prerequisites
        id: terraform_prereq
        run: |
          ready=true
          for name in \
            TF_VAR_databricks_host \
            TF_VAR_databricks_token \
            TF_VAR_data_platform_group \
            TF_VAR_product_backend_group \
            TF_VAR_product_analytics_group \
            TF_VAR_platform_ops_group \
            TF_VAR_governance_admin_group \
            TF_VAR_svc_market_ingestion \
            TF_VAR_svc_market_pipeline \
            TF_VAR_svc_ops_pipeline \
            TF_VAR_svc_audit_pipeline \
            TF_VAR_bundle_root \
            TF_VAR_ops_cluster_id
          do
            if [ -z "${!name}" ]; then
              echo "Missing Terraform input: $name"
              ready=false
            fi
          done
          echo "terraform_ready=$ready" >> "$GITHUB_OUTPUT"

      - name: Terraform init
        if: steps.terraform_prereq.outputs.terraform_ready == 'true'
        run: terraform init
        working-directory: databricks/terraform

      - name: Terraform validate
        if: steps.terraform_prereq.outputs.terraform_ready == 'true'
        run: terraform validate
        working-directory: databricks/terraform

      - name: Terraform plan dev
        if: steps.terraform_prereq.outputs.terraform_ready == 'true'
        run: terraform plan -out=tfplan
        working-directory: databricks/terraform

      - name: Export Terraform plan text
        if: steps.terraform_prereq.outputs.terraform_ready == 'true'
        run: terraform show -no-color tfplan > tfplan.txt
        working-directory: databricks/terraform

      - name: Upload Terraform dev plan artifact
        if: steps.terraform_prereq.outputs.terraform_ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-dev-plan
          path: |
            databricks/terraform/tfplan
            databricks/terraform/tfplan.txt

  deploy:
    runs-on: ubuntu-latest
    needs:
      - contract
      - terraform-dev-plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_SQL_WAREHOUSE_ID: ${{ secrets.DATABRICKS_SQL_WAREHOUSE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deploy dependencies
        run: python3 -m pip install --upgrade pip pyyaml

      - name: Install Databricks CLI
        run: python3 -m pip install --upgrade databricks-cli

      - name: Check deploy prerequisites
        id: prereq
        run: |
          ready=true
          if [ -z "$DATABRICKS_HOST" ] || [ -z "$DATABRICKS_TOKEN" ]; then
            echo "Missing Databricks credentials; skipping deploy."
            ready=false
          elif ! command -v databricks >/dev/null 2>&1; then
            echo "Databricks CLI not installed; skipping deploy."
            ready=false
          fi
          echo "deploy_ready=$ready" >> "$GITHUB_OUTPUT"

      - name: Validate bundle
        if: steps.prereq.outputs.deploy_ready == 'true'
        run: |
          cd databricks
          python3 validate_bundle.py
          databricks bundle validate

      - name: Deploy bundle
        if: steps.prereq.outputs.deploy_ready == 'true'
        run: |
          MARKET_PAYLOAD_JSON=$(python3 -c 'import json, pathlib; print(json.dumps(json.loads(pathlib.Path("databricks/fixtures/market_source_sample.json").read_text(encoding="utf-8")), separators=(",", ":")))')
          cd databricks
          databricks bundle deploy -t dev
          databricks bundle run market_source_ingestion_job -t dev -- --payload-json "$MARKET_PAYLOAD_JSON" --target-table "cgadev.market_bronze.bronze_market_snapshots"
          databricks bundle run ops_usage_ingestion_job -t dev
          databricks bundle run ops_bundle_run_ingestion_job -t dev
          databricks bundle run ops_sentinela_alert_ingestion_job -t dev
          databricks bundle run ops_readiness_refresh_job -t dev

      - name: Run live SQL validation
        if: steps.prereq.outputs.deploy_ready == 'true'
        run: python3 databricks/live_sql_validation.py

      - name: Upload live SQL validation artifact
        if: steps.prereq.outputs.deploy_ready == 'true' && env.DATABRICKS_SQL_WAREHOUSE_ID != ''
        uses: actions/upload-artifact@v4
        with:
          name: databricks-live-sql-validation
          path: databricks/live_sql_validation_results.json

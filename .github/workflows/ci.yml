name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: "Set to true to run Databricks bundle deploy after validation."
        required: false
        type: boolean
        default: false
      confirm_apps_deploy:
        description: "Set to true to deploy cga-analytics and cga-admin Databricks Apps."
        required: false
        type: boolean
        default: false
      confirm_uc_grants:
        description: "Run UC grants (catalog/schema/GRANT) against dev workspace."
        required: false
        type: boolean
        default: false
      confirm_train:
        description: "Run train_market_model_job after Silver data is ready."
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile repository Python
        run: python3 -m compileall backend databricks repo_tests apps

  contract:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependency
        run: python3 -m pip install --upgrade pip pyyaml

      - name: Run backend tests
        run: python3 -m unittest discover -s backend/tests -p 'test_*.py'

      - name: Run model tier router tests
        run: python3 -m unittest backend.tests.test_model_tier_router

      - name: Run Databricks bundle validation helper
        run: python3 databricks/tools/validate_bundle.py

      - name: Run market overview chain validation
        run: python3 databricks/tools/validate_market_overview_chain.py

      - name: Run enrichment chain validation
        run: python3 databricks/tools/validate_enrichment_chain.py

      - name: Run Databricks helper tests
        run: |
          python3 -m unittest databricks.tests.test_validate_bundle
          python3 -m unittest databricks.tests.test_validate_market_overview_chain
          python3 -m unittest databricks.tests.test_live_sql_validation
          python3 -m unittest databricks.tests.test_market_source_ingestion_job
          python3 -m unittest databricks.tests.test_bundle_run_observability
          python3 -m unittest databricks.tests.test_ops_usage_ingestion_job
          python3 -m unittest databricks.tests.test_ops_readiness_refresh_job
          python3 -m unittest databricks.tests.test_bundle_run_ingestion_job
          python3 -m unittest databricks.tests.test_sentinela_alert_ingestion_job
          python3 -m unittest databricks.tests.test_sentinela_alert_observability
          python3 -m unittest databricks.tests.test_ops_readiness_refresh_job
          python3 -m unittest databricks.tests.test_bronze_market_table_migration_job
          python3 -m unittest databricks.tests.test_silver_market_pipeline_job
          python3 -m unittest databricks.tests.test_silver_market_migration_job
          python3 -m unittest databricks.tests.test_defillama_ingestion_job
          python3 -m unittest databricks.tests.test_github_activity_ingestion_job
          python3 -m unittest databricks.tests.test_fred_macro_ingestion_job
          python3 -m unittest databricks.tests.test_bronze_enrichment_migration_job
          python3 -m unittest databricks.tests.test_silver_enrichment_migration_job
          python3 -m unittest databricks.tests.test_validate_enrichment_chain
          python3 -m unittest databricks.tests.test_feature_engineering_job
          python3 -m unittest databricks.tests.test_train_market_model_job
          python3 -m unittest databricks.tests.test_score_market_assets_job
          python3 -m unittest databricks.tests.test_sentinela_evaluation_job
          python3 -m unittest databricks.tests.test_uc_grants_job
          python3 -m unittest databricks.tests.test_rls_migration_job
          python3 -m unittest databricks.tests.test_model_drift_monitoring_job

      - name: Run workflow contract tests
        run: python3 -m unittest discover -s repo_tests -p 'test_*.py'

  deploy:
    runs-on: ubuntu-latest
    needs: contract
    if: github.event_name == 'workflow_dispatch' && inputs.confirm_deploy
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      DATABRICKS_SQL_WAREHOUSE_ID: ${{ secrets.DATABRICKS_SQL_WAREHOUSE_ID }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deploy dependencies
        run: python3 -m pip install --upgrade pip pyyaml

      - name: Install Databricks CLI
        uses: databricks/setup-cli@v0.231.0

      - name: Check deploy prerequisites
        id: prereq
        run: |
          ready=true
          if [ -z "$DATABRICKS_HOST" ]; then
            echo "Missing DATABRICKS_HOST; skipping deploy."
            ready=false
          elif [ -z "$DATABRICKS_TOKEN" ] && { [ -z "$DATABRICKS_CLIENT_ID" ] || [ -z "$DATABRICKS_CLIENT_SECRET" ]; }; then
            echo "Missing auth: set DATABRICKS_TOKEN or both DATABRICKS_CLIENT_ID and DATABRICKS_CLIENT_SECRET; skipping deploy."
            ready=false
          elif ! command -v databricks >/dev/null 2>&1; then
            echo "Databricks CLI not installed; skipping deploy."
            ready=false
          fi
          echo "deploy_ready=$ready" >> "$GITHUB_OUTPUT"

      - name: Validate bundle
        if: steps.prereq.outputs.deploy_ready == 'true'
        run: |
          python3 databricks/tools/validate_bundle.py
          databricks bundle validate

      - name: Deploy bundle
        if: steps.prereq.outputs.deploy_ready == 'true'
        run: |
          MARKET_PAYLOAD_JSON=$(python3 -c 'import json, pathlib; print(json.dumps(json.loads(pathlib.Path("databricks/fixtures/market_source_sample.json").read_text(encoding="utf-8")), separators=(",", ":")))')
          databricks bundle deploy -t dev
          # 1. All DDL migrations — tables must exist before views are created
          databricks bundle run bronze_market_table_migration_job -t dev
          databricks bundle run bronze_enrichment_migration_job -t dev
          databricks bundle run silver_market_table_migration_job -t dev
          databricks bundle run silver_enrichment_migration_job -t dev
          # 2. Bronze ingestion — populate raw data
          databricks bundle run market_source_ingestion_job -t dev -- --payload-json "$MARKET_PAYLOAD_JSON"
          databricks bundle run defillama_ingestion_job -t dev -- --skip-live
          databricks bundle run github_activity_ingestion_job -t dev -- --skip-live
          FRED_API_KEY="$FRED_API_KEY" databricks bundle run fred_macro_ingestion_job -t dev
          # 3. Silver pipelines — materialise from Bronze
          databricks bundle run silver_market_pipeline_job -t dev
          databricks bundle run silver_enrichment_pipeline_job -t dev
          # 4. Ops/observability — all tables and views are ready
          databricks bundle run ops_usage_ingestion_job -t dev
          databricks bundle run ops_bundle_run_ingestion_job -t dev
          databricks bundle run ops_sentinela_alert_ingestion_job -t dev
          databricks bundle run ops_readiness_refresh_job -t dev
          # 5. MLOps — feature engineering then scoring (training is on-demand only)
          databricks bundle run feature_engineering_job -t dev
          databricks bundle run score_market_assets_job -t dev
          databricks bundle run model_drift_monitoring_job -t dev
          # 6. Sentinela live evaluation
          databricks bundle run sentinela_evaluation_job -t dev

      - name: Run live SQL validation
        if: steps.prereq.outputs.deploy_ready == 'true'
        run: python3 databricks/tools/live_sql_validation.py

      - name: Upload live SQL validation artifact
        if: steps.prereq.outputs.deploy_ready == 'true' && env.DATABRICKS_SQL_WAREHOUSE_ID != ''
        uses: actions/upload-artifact@v4
        with:
          name: databricks-live-sql-validation
          path: databricks/live_sql_validation_results.json

  deploy_apps:
    runs-on: ubuntu-latest
    needs: contract
    if: github.event_name == 'workflow_dispatch' && inputs.confirm_apps_deploy
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deploy dependencies
        run: python3 -m pip install --upgrade pip pyyaml

      - name: Install Databricks CLI
        uses: databricks/setup-cli@v0.231.0

      - name: Check apps deploy prerequisites
        id: apps_prereq
        run: |
          ready=true
          if [ -z "$DATABRICKS_HOST" ]; then
            echo "Missing DATABRICKS_HOST; skipping apps deploy."
            ready=false
          elif [ -z "$DATABRICKS_TOKEN" ] && { [ -z "$DATABRICKS_CLIENT_ID" ] || [ -z "$DATABRICKS_CLIENT_SECRET" ]; }; then
            echo "Missing auth credentials; skipping apps deploy."
            ready=false
          fi
          echo "apps_ready=$ready" >> "$GITHUB_OUTPUT"

      - name: Validate bundle (apps section)
        if: steps.apps_prereq.outputs.apps_ready == 'true'
        run: databricks bundle validate -t dev

      - name: Deploy bundle (syncs app source code)
        if: steps.apps_prereq.outputs.apps_ready == 'true'
        run: databricks bundle deploy -t dev

      - name: Start cga-analytics app
        if: steps.apps_prereq.outputs.apps_ready == 'true'
        run: |
          databricks apps start cga-analytics --host "$DATABRICKS_HOST" || \
          echo "App cga-analytics already running or start not required."

      - name: Start cga-admin app
        if: steps.apps_prereq.outputs.apps_ready == 'true'
        run: |
          databricks apps start cga-admin --host "$DATABRICKS_HOST" || \
          echo "App cga-admin already running or start not required."

      - name: Verify apps are running
        if: steps.apps_prereq.outputs.apps_ready == 'true'
        run: |
          echo "=== cga-analytics ==="
          databricks apps get cga-analytics --host "$DATABRICKS_HOST" 2>/dev/null || echo "App not found — first deploy may still be initializing."
          echo "=== cga-admin ==="
          databricks apps get cga-admin --host "$DATABRICKS_HOST" 2>/dev/null || echo "App not found — first deploy may still be initializing."

  uc_grants:
    runs-on: ubuntu-latest
    needs: contract
    if: github.event_name == 'workflow_dispatch' && inputs.confirm_uc_grants
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
      - name: Run UC grants job
        run: databricks bundle run uc_grants_job -t dev

  train_models:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'workflow_dispatch' && inputs.confirm_train
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
      - name: Train models
        run: databricks bundle run train_market_model_job -t dev
